name: Jules AI Agent Task

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'What should Jules do?'
        required: true
        default: 'Review this repository for security best practices and performance bottlenecks.'

jobs:
  jules-task:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'jules'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Jules Action
        uses: google-labs-code/jules-action@v1
        with:
          jules-api-key: ${{ secrets.JULES_API_KEY }}
          prompt: ${{ github.event.inputs.prompt || github.event.issue.body }}
          repo-context: true
